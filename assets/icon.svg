<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient: Deep premium blue -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A66C2"/>
      <stop offset="100%" stop-color="#004182"/>
    </linearGradient>
    
    <!-- Accent Green Gradient for freshness -->
    <linearGradient id="freshGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    
    <!-- Glassmorphism overlay gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0"/>
    </linearGradient>

    <!-- Shadow filter for depth -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Base Icon Shape with rounded corners -->
  <rect width="128" height="128" rx="28" fill="url(#bgGrad)"/>
  
  <!-- Subtle inner shine -->
  <rect x="2" y="2" width="124" height="124" rx="26" stroke="url(#glassGrad)" stroke-width="2"/>

  <!-- Hourglass / Clock representing Freshness -->
  <!-- Let's draw a magnifying glass and a clock -->
  <g filter="url(#dropShadow)" transform="translate(4, 2)">
    <!-- Magnifying Glass handle -->
    <path d="M78 78 L104 104" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"/>
    <!-- Magnifying glass outer ring -->
    <circle cx="56" cy="56" r="32" stroke="#FFFFFF" stroke-width="8" fill="#0A66C2"/>
    
    <!-- Clock inside the magnifying glass representing Time/Freshness -->
    <circle cx="56" cy="56" r="22" fill="#004182" stroke="#FFFFFF" stroke-width="2"/>
    
    <!-- Clock hands -->
    <path d="M56 38 V56 H70" stroke="#10B981" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- A bright green badge in the top-right corner indicating "Fresh / New" -->
  <g filter="url(#dropShadow)" transform="translate(86, 14)">
    <!-- Badge background -->
    <circle cx="16" cy="16" r="16" fill="url(#freshGrad)"/>
    <circle cx="16" cy="16" r="16" stroke="#FFFFFF" stroke-width="2.5"/>
    <!-- Lightning bolt inside the badge -->
    <path d="M16 6 L9 17 H15 L14 26 L23 15 H17 Z" fill="#FFFFFF"/>
  </g>
</svg>
