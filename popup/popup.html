<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn Fresh Jobs</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="popup-header">
      <div class="popup-title">
        <span class="popup-icon">🔍</span>
        <span>Fresh Jobs</span>
      </div>
      <div class="popup-version">v1.0</div>
    </div>

    <!-- Main Content -->
    <div class="popup-content">
      <!-- Quick Filters -->
      <div class="section">
        <div class="section-title">Quick Presets</div>
        <div class="preset-buttons" id="presetButtonsContainer" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;">
          <!-- Populated dynamically -->
        </div>
      </div>

      <!-- Custom Range Filter -->
      <div class="section">
        <div class="section-title">Custom Range Filter</div>
        <div style="display: flex; gap: 8px; align-items: center;">
          <input type="number" id="customMinInput" class="select-control" style="width: 70px; margin-top: 0; padding: 6px;" placeholder="Min" min="0" value="0">
          <span style="font-size: 13px;">to</span>
          <input type="number" id="customMaxInput" class="select-control" style="width: 70px; margin-top: 0; padding: 6px;" placeholder="Max" min="0" value="60">
          <span style="font-size: 13px;">min</span>
          <button id="applyCustomBtn" class="footer-btn" style="flex-grow: 1; padding: 6px 12px; margin-top: 0; border: 1px solid var(--border-color); border-radius: 4px; cursor: pointer;">
            Apply
          </button>
        </div>
      </div>

      <!-- Current Filter Display -->
      <div class="section">
        <div class="section-title">Active Filter</div>
        <div class="current-filter" id="currentFilter">
          <span class="filter-icon">🎯</span>
          <span class="filter-info">
            <span class="filter-name" id="filterName">Show All</span>
            <span class="filter-desc" id="filterDesc">Showing all jobs</span>
          </span>
        </div>
      </div>

      <!-- Statistics -->
      <div class="section">
        <div class="section-title">Statistics</div>
        <div class="stats-grid" id="statsGridContainer">
          <div class="stat-card">
            <div class="stat-label">Total</div>
            <div class="stat-value" id="statTotal">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Filtered</div>
            <div class="stat-value" id="statFiltered">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Now</div>
            <div class="stat-value" id="statNow">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">0–10m</div>
            <div class="stat-value" id="stat0to10">—</div>
          </div>
        </div>
      </div>

      <!-- Settings -->
      <div class="section">
        <div class="section-title">Settings</div>
        
        <div class="setting-row">
          <label class="setting-label">Theme</label>
          <select id="themeSelect" class="select-control">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
            <option value="auto">Auto</option>
          </select>
        </div>

        <div class="setting-row">
          <label class="setting-label">Panel Position</label>
          <select id="positionSelect" class="select-control">
            <option value="bottom-right">Bottom Right</option>
            <option value="bottom-left">Bottom Left</option>
            <option value="top-right">Top Right</option>
            <option value="top-left">Top Left</option>
          </select>
        </div>

        <div class="setting-row">
          <label class="setting-label">Auto Scan</label>
          <div class="toggle-switch">
            <input type="checkbox" id="autoScanToggle" class="toggle-input">
            <label for="autoScanToggle" class="toggle-label"></label>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="popup-footer">
      <div class="footer-links">
        <button id="refreshBtn" class="footer-btn" title="Refresh scan">
          🔄 Refresh
        </button>
        <button id="openDocsBtn" class="footer-btn" title="Keyboard shortcuts">
          ⌨️ Shortcuts
        </button>
      </div>
      <div class="footer-status">
        <span id="connectionStatus" class="status-indicator">●</span>
        <span id="statusText">Connected</span>
      </div>
    </div>
  </div>

  <!-- Shortcuts Modal -->
  <div id="shortcutsModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Keyboard Shortcuts</h2>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="shortcut-item">
          <kbd>Ctrl + Shift + L</kbd>
          <span>Toggle Dashboard</span>
        </div>
        <div class="shortcut-item">
          <kbd>Ctrl + Shift + R</kbd>
          <span>Reset Filters</span>
        </div>
        <div class="shortcut-item">
          <kbd>Ctrl + Shift + T</kbd>
          <span>Toggle Theme</span>
        </div>
      </div>
    </div>
  </div>

  <script src="../utils/constants.js"></script>
  <script src="../utils/logger.js"></script>
  <script src="../utils/helpers.js"></script>
  <script src="../utils/storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
